services:
  - type: web
    name: innovasoft-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: innovasoft_app
      - key: INNOVASOFT_API_BASE
        value: https://pruebareactjs.test-class.com/Api
      - key: SERVE_FRONTEND
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_RENDER_REGEX
        value: "true"

  - type: web
    name: innovasoft-front
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false
